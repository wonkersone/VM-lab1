<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>СЛАУ: Метод простых итераций</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="card header-card">
        <h1>Лабораторная работа №1</h1>
        <p>Вариант 7 | Лейковский Никита | ИСУ: 466497</p>
    </div>

    <div class="card">
        <h3>Введите параметры матрицы</h3>
        <div id="error-box" class="error" style="display:none;"></div>
        <div class="input-group">
            <label>Размерность (n ≤ 20):</label>
            <input type="number" id="matrix-n" min="1" max="20" value="3">
            <button onclick="generateTable()">Создать</button>
            <span class="or">или</span>
            <input type="file" id="file-input" accept=".txt">
        </div>
    </div>

    <div id="matrix-area" class="card" style="display:none;">
        <h3>Коэффициенты матрицы [A|B]</h3>
        <div id="matrix-container"></div>
        <div class="controls">
            <label>Точность (ε):</label>
            <input type="text" id="eps" value="0,001">
            <button class="btn-primary" onclick="solve()">Вычислить</button>
            <button class="btn-secondary" onclick="fillRandom()">Случайные значения</button>
        </div>
    </div>

    <div id="result-area" class="card" style="display:none;">
        <h3>Результаты</h3>
        <div id="meta-info"></div>
        <table id="result-table">
            <thead>
            <tr>
                <th>Переменная</th>
                <th>Значение (xᵢ)</th>
                <th>Погрешность (|xᵢᵏ - xᵢᵏ⁻¹|)</th>
            </tr>
            </thead>
            <tbody id="result-body"></tbody>
        </table>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
